<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือแปลงหน่วย - Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-container">
        <h2>เครื่องมือแปลงหน่วย</h2>
        
        <div class="form-group">
            <label for="category">หมวดหมู่:</label>
            <select id="category">
                <option value="length">📏 ความยาว</option>
                <option value="weight">⚖️ น้ำหนัก</option>
                <option value="temperature">🌡️ อุณหภูมิ</option>
            </select>
        </div>

        <div class="input-group">
            <input type="number" id="inputValue" placeholder="กรอกตัวเลข..." value="1">
            <select id="unitFrom"></select>
        </div>

        <div class="icon-container">
            <button id="swapBtn" type="button" title="สลับหน่วย">🔄 สลับหน่วย</button>
        </div>

        <div class="input-group">
            <div class="result-wrapper">
                <input type="text" id="outputValue" readonly placeholder="ผลลัพธ์">
                <button id="copyBtn" type="button" title="คัดลอกผลลัพธ์">📋</button>
            </div>
            <select id="unitTo"></select>
        </div>

        <div class="history-container">
            <div class="history-header">
                <h3>ประวัติการแปลงล่าสุด</h3>
                <button id="clearHistoryBtn">ล้างประวัติ</button>
            </div>
            <ul id="historyList"></ul>
        </div>

        <!-- Footer แสดงชื่อและรายวิชา -->
        <footer class="app-footer">
            <p>👤 จัดทำโดย: <span>นายอัธฑสัณ เอาะตะเมาะ</span></p>
            <p>📚 รายวิชา: <span>Select Topic Software</span></p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
